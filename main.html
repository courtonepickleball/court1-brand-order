<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코트원 피클볼</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="site-logo"><span>코트원</span> 피클볼</div>
      <button class="cart-toggle" id="cartToggle" aria-label="장바구니 열기">
        장바구니 <span id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main class="container page">
    <section class="hero">
      <div class="hero-banner"></div>
      <h1 class="page-title">코트원 피클볼 상품</h1>
      <p class="page-subtitle">상품을 담고 하단에 주문서를 완성해 주세요.</p>

      <div class="notice">
        <div class="code-row">
          <input type="text" id="customerCode" placeholder="코드번호 입력" autocomplete="off" />
          <button class="code-btn equal-btn" id="checkCode" aria-pressed="false">코드 확인</button>
          <button class="code-btn equal-btn" id="clearCode" aria-pressed="false">코드 없음</button>
        </div>
        <div class="promo-state" id="promoState" aria-live="polite"></div>
      </div>
    </section>

    <section class="order-panel">
      <div class="panel-head">
        <h2>상품 필터</h2>
        <button class="btn-secondary" id="resetFilters" type="button">전체보기</button>
      </div>

      <div class="filter-group">
        <div class="filter-block">
          <div class="field-label">브랜드</div>
          <div id="brandFilters" class="filter-buttons"></div>
        </div>

        <div class="filter-block">
          <div class="field-label">카테고리</div>
          <div id="categoryFilters" class="filter-buttons"></div>
        </div>

        <div class="filter-block">
          <div class="field-label">가격 정렬</div>
          <div class="filter-choice compact">
            <label class="radio-pill small">
              <input type="radio" name="sortType" value="default" checked />
              <span>기본</span>
            </label>
            <label class="radio-pill small">
              <input type="radio" name="sortType" value="price-asc" />
              <span>낮은순</span>
            </label>
            <label class="radio-pill small">
              <input type="radio" name="sortType" value="price-desc" />
              <span>높은순</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="product-grid" id="productGrid"></section>

    <section class="order-panel">
      <div class="panel-head">
        <h2>장바구니</h2>
        <button class="btn-secondary" id="clearCart">전체 삭제</button>
      </div>
      <div id="cartList" class="cart-list"></div>
      <div class="cart-summary">
        <div>합계</div>
        <div id="cartTotal">₩0</div>
      </div>
    </section>

    <section class="order-panel">
      <h2>주문자 정보</h2>
      <form id="orderForm" class="order-form">
        <input type="text" id="customerName" placeholder="이름" required />
        <input type="tel" id="customerPhone" placeholder="연락처" required />

        <div class="delivery-box">
          <div class="field-label">수령 방식</div>
          <div class="delivery-choice compact">
            <label class="radio-pill small">
              <input type="radio" name="deliveryType" value="pickup" checked />
              <span>직접수령</span>
            </label>
            <label class="radio-pill small">
              <input type="radio" name="deliveryType" value="delivery" />
              <span>택배 수령</span>
            </label>
          </div>
        </div>

        <div id="addressWrap" class="address-wrap is-hidden">
          <input type="text" id="customerAddress" placeholder="택배 주소" />
        </div>

        <textarea id="customerMemo" placeholder="메모(선택)"></textarea>
        <button type="submit" class="btn-primary">메일로 주문서 작성</button>
      </form>
      <p class="final-note">주문서 작성을 완료 하면 연락처를 통하여 결제금액 과 입금계좌 정보가 발송됩니다.</p>
    </section>
  </main>

  <script src="assets/js/products.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
